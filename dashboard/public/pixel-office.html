<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Agents</title>
    <link rel="stylesheet" crossorigin href="./pixel-assets/index-8M7aiFDb.css">
    <style>
      html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    </style>
    <script>
      // Mock VS Code API for browser
      window.acquireVsCodeApi = function() {
        const state = {};
        return {
          postMessage: function(msg) {
            window.parent.postMessage({ source: 'pixel-agents', payload: msg }, '*');
          },
          getState: function() { return state; },
          setState: function(newState) { Object.assign(state, newState); },
        };
      };

      // After React mounts, send init messages that pixel-agents expects
      window.addEventListener('load', function() {
        setTimeout(function() {
          // Load default layout
          fetch('./pixel-assets/default-layout-1.json')
            .then(r => r.json())
            .then(layout => {
              window.postMessage({ type: 'layoutLoaded', layout: layout }, '*');
            });

          // Send settings
          window.postMessage({ type: 'settingsLoaded', settings: {
            soundEnabled: false,
            zoom: 2,
          }}, '*');

          // Send workspace info
          window.postMessage({ type: 'workspaceFolders', folders: [
            { name: 'project', uri: '/' }
          ]}, '*');

          // Send existing agents from parent (will be populated by dashboard)
          window.postMessage({ type: 'existingAgents', agents: [] }, '*');
        }, 500);
      });

      // Listen for messages from parent dashboard
      window.addEventListener('message', function(event) {
        if (event.data && event.data.source === 'sdlc-dashboard') {
          // Re-dispatch as regular message event for pixel-agents
          const payload = event.data.payload;
          window.postMessage(payload, '*');
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" crossorigin src="./pixel-assets/index-D5Mbhoaa.js"></script>
  </body>
</html>
