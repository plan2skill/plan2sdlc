<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Agents</title>
    <link rel="stylesheet" crossorigin href="./pixel-assets/index-8M7aiFDb.css">
    <style>
      html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    </style>
    <script>
      // Mock VS Code API for browser
      window.acquireVsCodeApi = function() {
        const state = {};
        return {
          postMessage: function(msg) {
            window.parent.postMessage({ source: 'pixel-agents', payload: msg }, '*');
          },
          getState: function() { return state; },
          setState: function(newState) { Object.assign(state, newState); },
        };
      };

      // Agent tracking
      let agentIdCounter = 1;
      const agentMap = {}; // name → numeric id

      function getOrCreateAgent(name) {
        if (!agentMap[name]) {
          agentMap[name] = agentIdCounter++;
          // Create agent in pixel office
          window.postMessage({
            type: 'agentCreated',
            id: agentMap[name],
            folderName: name,
          }, '*');
        }
        return agentMap[name];
      }

      function setAgentActive(name, toolName) {
        const id = getOrCreateAgent(name);
        window.postMessage({
          type: 'agentSelected',
          id: id,
        }, '*');
        window.postMessage({
          type: 'agentToolStart',
          id: id,
          toolId: 'tool-' + Date.now(),
          status: toolName || 'Working...',
        }, '*');
      }

      function setAgentIdle(name) {
        const id = agentMap[name];
        if (!id) return;
        window.postMessage({
          type: 'agentToolsClear',
          id: id,
        }, '*');
      }

      function setAgentWaiting(name) {
        const id = getOrCreateAgent(name);
        window.postMessage({
          type: 'agentStatus',
          id: id,
          status: 'waiting',
        }, '*');
      }

      // Init: load layout + settings, create default agents
      window.addEventListener('load', function() {
        setTimeout(function() {
          // Load layout
          fetch('./pixel-assets/default-layout-1.json')
            .then(r => r.json())
            .then(layout => {
              window.postMessage({ type: 'layoutLoaded', layout: layout }, '*');

              // Give layout time to render, then create agents
              setTimeout(function() {
                // Send settings
                window.postMessage({ type: 'settingsLoaded', settings: {
                  soundEnabled: false,
                  zoom: 2,
                }}, '*');

                // Create orchestrator agent immediately
                getOrCreateAgent('orchestrator');
                setAgentActive('orchestrator', 'Orchestrating...');
              }, 300);
            });
        }, 200);
      });

      // Listen for messages from parent dashboard (terminal activity)
      window.addEventListener('message', function(event) {
        if (event.data && event.data.source === 'sdlc-dashboard') {
          const payload = event.data.payload;

          if (payload.action === 'createAgent') {
            getOrCreateAgent(payload.name);
          }
          else if (payload.action === 'activateAgent') {
            setAgentActive(payload.name, payload.tool);
          }
          else if (payload.action === 'idleAgent') {
            setAgentIdle(payload.name);
          }
          else if (payload.action === 'waitingAgent') {
            setAgentWaiting(payload.name);
          }
          else if (payload.action === 'stateUpdate') {
            // Create agents from registry/workflow state
            const agents = payload.agents || [];
            for (const name of agents) {
              getOrCreateAgent(name);
            }
            const active = payload.activeAgents || [];
            for (const a of active) {
              setAgentActive(a.name, a.tool);
            }
          }
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" crossorigin src="./pixel-assets/index-D5Mbhoaa.js"></script>
  </body>
</html>
