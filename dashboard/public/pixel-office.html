<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Agents</title>
    <link rel="stylesheet" crossorigin href="./pixel-assets/index-8M7aiFDb.css">
    <style>
      html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    </style>
    <script>
      // Mock VS Code API
      window.acquireVsCodeApi = function() {
        const state = {};
        return {
          postMessage: function(msg) {
            if (msg.type === 'webviewReady') {
              // Pixel-agents signals it's ready — send all init data
              setTimeout(initPixelAgents, 100);
            }
            window.parent.postMessage({ source: 'pixel-agents', payload: msg }, '*');
          },
          getState: function() { return state; },
          setState: function(newState) { Object.assign(state, newState); },
        };
      };

      // Load an image as ImageBitmap
      async function loadImage(url) {
        const response = await fetch(url);
        const blob = await response.blob();
        return await createImageBitmap(blob);
      }

      // Load all furniture from manifests
      async function loadFurniture() {
        const furnitureTypes = [
          'BIN','BOOKSHELF','CACTUS','CLOCK','COFFEE','COFFEE_TABLE',
          'CUSHIONED_BENCH','CUSHIONED_CHAIR','DESK','DOUBLE_BOOKSHELF',
          'HANGING_PLANT','LARGE_PAINTING','LARGE_PLANT','PC','PLANT',
          'PLANT_2','POT','SMALL_PAINTING','SMALL_PAINTING_2','SMALL_TABLE',
          'SOFA','TABLE_FRONT','WHITEBOARD','WOODEN_BENCH','WOODEN_CHAIR'
        ];
        const catalog = [];
        const sprites = {};
        for (const type of furnitureTypes) {
          try {
            const resp = await fetch(`./pixel-assets/furniture/${type}/manifest.json`);
            const manifest = await resp.json();
            catalog.push({ type, manifest });
            // Load sprite images referenced in manifest
            const typeSprites = {};
            for (const variant of Object.keys(manifest.variants || {})) {
              const img = manifest.variants[variant];
              if (img && img.file) {
                typeSprites[variant] = await loadImage(`./pixel-assets/furniture/${type}/${img.file}`);
              }
            }
            // Also load default sprite
            if (manifest.file) {
              typeSprites['default'] = await loadImage(`./pixel-assets/furniture/${type}/${manifest.file}`);
            }
            // Load all PNGs in the type directory
            for (const key of Object.keys(manifest)) {
              if (typeof manifest[key] === 'string' && manifest[key].endsWith('.png')) {
                const spriteName = key;
                typeSprites[spriteName] = await loadImage(`./pixel-assets/furniture/${type}/${manifest[key]}`);
              }
            }
            sprites[type] = typeSprites;
          } catch(e) {
            // Skip furniture that fails to load
          }
        }
        return { catalog, sprites };
      }

      async function initPixelAgents() {
        try {
          // 1. Load character sprites (6 characters)
          const characters = [];
          for (let i = 0; i < 6; i++) {
            try {
              const bmp = await loadImage(`./pixel-assets/characters/char_${i}.png`);
              characters.push(bmp);
            } catch(e) {}
          }
          window.postMessage({ type: 'characterSpritesLoaded', characters }, '*');

          // 2. Load floor tiles (9 types)
          const floors = [];
          for (let i = 0; i < 9; i++) {
            try {
              const bmp = await loadImage(`./pixel-assets/floors/floor_${i}.png`);
              floors.push(bmp);
            } catch(e) {}
          }
          window.postMessage({ type: 'floorTilesLoaded', sprites: floors }, '*');

          // 3. Load wall tiles
          const walls = [];
          try {
            const bmp = await loadImage(`./pixel-assets/walls/wall_0.png`);
            walls.push(bmp);
          } catch(e) {}
          window.postMessage({ type: 'wallTilesLoaded', sets: walls }, '*');

          // 4. Load furniture
          const { catalog, sprites } = await loadFurniture();
          window.postMessage({ type: 'furnitureAssetsLoaded', catalog, sprites }, '*');

          // 5. Load layout
          const layoutResp = await fetch('./pixel-assets/default-layout-1.json');
          const layout = await layoutResp.json();
          window.postMessage({ type: 'layoutLoaded', layout }, '*');

          // 6. Settings
          window.postMessage({ type: 'settingsLoaded', soundEnabled: false }, '*');

          // 7. Workspace
          window.postMessage({ type: 'workspaceFolders', folders: [{ name: 'project', uri: '/' }] }, '*');

          // 8. Create orchestrator agent
          window.postMessage({ type: 'existingAgents', agents: [1], agentMeta: {}, folderNames: { 1: 'orchestrator' } }, '*');

          console.log('[pixel-office] Init complete: characters=' + characters.length + ' floors=' + floors.length + ' furniture=' + catalog.length);
        } catch(e) {
          console.error('[pixel-office] Init failed:', e);
        }
      }

      // Listen for messages from parent
      window.addEventListener('message', function(event) {
        if (event.data && event.data.source === 'sdlc-dashboard') {
          const p = event.data.payload;
          if (p.action === 'createAgent') {
            const id = Object.keys(window._agentMap || {}).length + 2;
            window._agentMap = window._agentMap || {};
            window._agentMap[p.name] = id;
            window.postMessage({ type: 'agentCreated', id, folderName: p.name }, '*');
          }
          else if (p.action === 'activateAgent') {
            window._agentMap = window._agentMap || {};
            let id = window._agentMap[p.name];
            if (!id) {
              id = Object.keys(window._agentMap).length + 2;
              window._agentMap[p.name] = id;
              window.postMessage({ type: 'agentCreated', id, folderName: p.name }, '*');
            }
            window.postMessage({ type: 'agentSelected', id }, '*');
            window.postMessage({ type: 'agentToolStart', id, toolId: 'tool-' + Date.now(), status: p.tool || 'Working...' }, '*');
          }
          else if (p.action === 'stateUpdate') {
            window._agentMap = window._agentMap || {};
            for (const name of (p.agents || [])) {
              if (!window._agentMap[name]) {
                const id = Object.keys(window._agentMap).length + 2;
                window._agentMap[name] = id;
                window.postMessage({ type: 'agentCreated', id, folderName: name }, '*');
              }
            }
            for (const a of (p.activeAgents || [])) {
              const id = window._agentMap[a.name];
              if (id) {
                window.postMessage({ type: 'agentToolStart', id, toolId: 'tool-' + Date.now(), status: a.tool || 'Working...' }, '*');
              }
            }
          }
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" crossorigin src="./pixel-assets/index-D5Mbhoaa.js"></script>
  </body>
</html>
