<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDLC Dashboard — Plan2Skill</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117; color: #c9d1d9;
      height: 100vh; display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* Status bar */
    .status-bar {
      height: 36px; background: #161b22;
      display: flex; align-items: center;
      padding: 0 16px; gap: 24px;
      border-bottom: 1px solid #30363d;
      font-size: 13px;
    }
    .status-bar .brand {
      font-weight: 600; color: #58a6ff;
    }
    .status-bar .stat {
      color: #8b949e;
    }
    .status-bar .stat span {
      color: #c9d1d9; font-weight: 500;
    }

    /* Main content */
    .main {
      flex: 1; display: flex; overflow: hidden;
    }

    /* Office panel */
    .office-panel {
      flex: 0 0 65%; background: #0d1117;
      display: flex; flex-direction: column;
      border-right: 1px solid #30363d;
    }
    .office-canvas-container {
      flex: 1; position: relative;
      overflow: hidden;
    }
    #office-canvas {
      width: 100%; height: 100%;
      image-rendering: pixelated;
    }
    .office-placeholder {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; color: #8b949e;
    }
    .office-placeholder h2 { color: #58a6ff; margin-bottom: 8px; }

    /* Agent info popup */
    .agent-popup {
      display: none; position: absolute;
      background: #1c2128; border: 1px solid #30363d;
      border-radius: 8px; padding: 12px 16px;
      min-width: 200px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 100;
    }
    .agent-popup.visible { display: block; }
    .agent-popup .agent-name { font-weight: 600; color: #58a6ff; font-size: 14px; }
    .agent-popup .agent-role { color: #8b949e; font-size: 12px; margin-top: 2px; }
    .agent-popup .agent-status { margin-top: 8px; font-size: 12px; }

    /* Terminal panel */
    .terminal-panel {
      flex: 0 0 35%; display: flex; flex-direction: column;
      background: #0d1117;
    }
    .terminal-header {
      height: 36px; background: #161b22;
      display: flex; align-items: center;
      padding: 0 12px; border-bottom: 1px solid #30363d;
      font-size: 13px; font-weight: 600;
    }
    .terminal-header .dot {
      width: 8px; height: 8px; border-radius: 50%;
      margin-right: 8px;
    }
    .terminal-header .dot.green { background: #3fb950; }
    .terminal-header .dot.yellow { background: #d29922; }
    .terminal-header .dot.red { background: #f85149; }
    #terminal-container {
      flex: 1; padding: 4px;
    }

    /* Progress bar */
    .progress-bar {
      height: 40px; background: #161b22;
      display: flex; align-items: center;
      padding: 0 16px; gap: 8px;
      border-top: 1px solid #30363d;
      font-size: 12px; overflow-x: auto;
    }
    .progress-step {
      display: flex; align-items: center; gap: 4px;
      white-space: nowrap;
    }
    .progress-step.done { color: #3fb950; }
    .progress-step.active { color: #58a6ff; font-weight: 600; }
    .progress-step.pending { color: #484f58; }
    .progress-arrow { color: #30363d; }
  </style>
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="brand">SDLC Dashboard</div>
    <div class="stat">Tasks: <span id="stat-tasks">0</span></div>
    <div class="stat">Active: <span id="stat-active">0</span></div>
    <div class="stat">Cost: <span id="stat-cost">$0.00</span></div>
    <div class="stat" style="margin-left:auto; color:#484f58;">Plan2Skill</div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <!-- Office Panel -->
    <div class="office-panel">
      <div class="office-canvas-container">
        <canvas id="office-canvas"></canvas>
        <div class="office-placeholder" id="office-placeholder">
          <h2>Pixel Office</h2>
          <p>Agent visualization</p>
          <p style="margin-top:12px; font-size:12px;">Agents will appear here when workflows are active</p>
          <div id="agent-grid" style="margin-top:20px; display:flex; flex-wrap:wrap; gap:8px; justify-content:center;"></div>
        </div>
        <div class="agent-popup" id="agent-popup">
          <div class="agent-name" id="popup-name"></div>
          <div class="agent-role" id="popup-role"></div>
          <div class="agent-status" id="popup-status"></div>
        </div>
      </div>
    </div>

    <!-- Terminal Panel -->
    <div class="terminal-panel">
      <div class="terminal-header">
        <div class="dot green" id="terminal-dot"></div>
        SDLC Orchestrator
      </div>
      <div id="terminal-container"></div>
    </div>
  </div>

  <!-- Progress Bar -->
  <div class="progress-bar" id="progress-bar">
    <span style="color:#8b949e;">No active workflow</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script>
    // ===== Terminal Setup =====
    const term = new Terminal({
      theme: {
        background: '#0d1117',
        foreground: '#c9d1d9',
        cursor: '#58a6ff',
        selectionBackground: '#264f78',
        black: '#484f58',
        red: '#ff7b72',
        green: '#3fb950',
        yellow: '#d29922',
        blue: '#58a6ff',
        magenta: '#bc8cff',
        cyan: '#39d353',
        white: '#c9d1d9',
      },
      fontSize: 13,
      fontFamily: "'Cascadia Code', 'Fira Code', 'Consolas', monospace",
      cursorBlink: true,
      scrollback: 5000,
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal-container'));
    fitAddon.fit();

    // Terminal WebSocket
    let termWs;
    function connectTerminal() {
      termWs = new WebSocket(`ws://${location.host}/ws/terminal`);

      termWs.onopen = () => {
        document.getElementById('terminal-dot').className = 'dot green';
        termWs.send(JSON.stringify({
          type: 'resize',
          cols: term.cols,
          rows: term.rows
        }));
      };

      termWs.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'output') {
          term.write(msg.data);
        } else if (msg.type === 'exit') {
          term.write('\r\n\x1b[33m[Session ended. Refresh to restart.]\x1b[0m\r\n');
          document.getElementById('terminal-dot').className = 'dot red';
        }
      };

      termWs.onclose = () => {
        document.getElementById('terminal-dot').className = 'dot yellow';
        term.write('\r\n\x1b[33m[Disconnected. Reconnecting...]\x1b[0m\r\n');
        setTimeout(connectTerminal, 2000);
      };

      termWs.onerror = () => {
        document.getElementById('terminal-dot').className = 'dot red';
      };
    }

    term.onData((data) => {
      if (termWs && termWs.readyState === WebSocket.OPEN) {
        termWs.send(JSON.stringify({ type: 'input', data }));
      }
    });

    term.onResize(({ cols, rows }) => {
      if (termWs && termWs.readyState === WebSocket.OPEN) {
        termWs.send(JSON.stringify({ type: 'resize', cols, rows }));
      }
    });

    connectTerminal();

    // ===== State Updates =====
    let stateWs;
    function connectState() {
      stateWs = new WebSocket(`ws://${location.host}/ws/state`);

      stateWs.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'state') {
          updateDashboard(msg.data);
        }
      };

      stateWs.onclose = () => {
        setTimeout(connectState, 3000);
      };
    }
    connectState();

    // Initial state load
    fetch('/api/state')
      .then(r => r.json())
      .then(updateDashboard)
      .catch(() => {});

    function updateDashboard(state) {
      // Update stats
      const backlog = state.backlog;
      const items = Array.isArray(backlog) ? backlog : (backlog?.items || []);
      const activeItems = items.filter(i => !['done', 'abandoned'].includes(i.status));
      document.getElementById('stat-tasks').textContent = activeItems.length;

      const workflows = state.workflow?.activeWorkflows || [];
      document.getElementById('stat-active').textContent = workflows.length;

      const totalCost = items.reduce((sum, i) => sum + (i.actualCost || 0), 0);
      document.getElementById('stat-cost').textContent = '$' + totalCost.toFixed(2);

      // Update agent grid
      updateAgentGrid(workflows, items);

      // Update progress bar
      updateProgressBar(workflows, items);
    }

    function updateAgentGrid(workflows, items) {
      const grid = document.getElementById('agent-grid');
      if (!grid) return;

      // Collect agents from active workflows
      const agents = new Set();
      if (workflows.length > 0) {
        // Show workflow-related agents
        for (const wf of workflows) {
          agents.add('orchestrator');
          if (wf.domains) {
            for (const d of wf.domains) {
              agents.add(d + '-developer');
              agents.add(d + '-tester');
            }
          }
        }
      }

      if (agents.size === 0) {
        // Default agents
        ['orchestrator', 'architect', 'reviewer', 'developer', 'tester'].forEach(a => agents.add(a));
      }

      const icons = {
        orchestrator: '[O]', architect: '[A]', reviewer: '[R]',
        developer: '[D]', tester: '[T]', default: '[?]'
      };

      grid.innerHTML = [...agents].map(name => {
        const icon = Object.entries(icons).find(([k]) => name.includes(k))?.[1] || icons.default;
        const isActive = workflows.some(wf => wf.currentSession === 'EXECUTE');
        return `<div style="
          background:#1c2128; border:1px solid #30363d; border-radius:8px;
          padding:8px 12px; text-align:center; min-width:80px; cursor:pointer;
          ${isActive ? 'border-color:#58a6ff;' : ''}
        " onclick="showAgentPopup(event, '${name}')">
          <div style="font-size:20px; font-family:monospace; color:#58a6ff;">${icon}</div>
          <div style="font-size:10px; color:#8b949e; margin-top:2px;">${name}</div>
        </div>`;
      }).join('');
    }

    function updateProgressBar(workflows, items) {
      const bar = document.getElementById('progress-bar');
      if (workflows.length === 0) {
        bar.innerHTML = '<span style="color:#8b949e;">No active workflow</span>';
        return;
      }

      const wf = workflows[0];
      const chain = wf.sessionChain || ['EXECUTE'];
      const current = wf.currentSession || chain[0];
      const currentIdx = chain.indexOf(current);

      // Find backlog item
      const task = items.find(i => i.id === wf.backlogItemId);
      const taskLabel = task ? `${task.id}: ${task.title}` : wf.backlogItemId;

      bar.innerHTML = `<span style="color:#58a6ff; font-weight:600; margin-right:12px;">${taskLabel}</span>` +
        chain.map((step, i) => {
          let cls = 'pending';
          let icon = '[ ]';
          if (i < currentIdx) { cls = 'done'; icon = '[x]'; }
          else if (i === currentIdx) { cls = 'active'; icon = '[>]'; }
          return `<span class="progress-step ${cls}">${icon} ${step}</span>` +
            (i < chain.length - 1 ? '<span class="progress-arrow">-></span>' : '');
        }).join('');
    }

    function showAgentPopup(event, name) {
      const popup = document.getElementById('agent-popup');
      document.getElementById('popup-name').textContent = name;
      document.getElementById('popup-role').textContent = name.includes('developer') ? 'Developer' :
        name.includes('tester') ? 'Tester' : name.includes('architect') ? 'Architect' :
        name.includes('reviewer') ? 'Reviewer' : name === 'orchestrator' ? 'Orchestrator' : 'Agent';
      document.getElementById('popup-status').innerHTML = '<span style="color:#3fb950;">&#9679;</span> Active';
      popup.style.left = event.clientX + 'px';
      popup.style.top = event.clientY + 'px';
      popup.classList.add('visible');

      setTimeout(() => popup.classList.remove('visible'), 3000);
    }

    // Handle resize
    window.addEventListener('resize', () => {
      fitAddon.fit();
    });

    // Click outside popup closes it
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.agent-popup') && !e.target.closest('[onclick]')) {
        document.getElementById('agent-popup').classList.remove('visible');
      }
    });
  </script>
</body>
</html>
